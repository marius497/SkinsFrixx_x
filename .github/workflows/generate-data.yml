// generate-data.js
// Запуск: node generate-data.js
// Сканирует папку skins/images и создаёт data.json автоматически.

const fs = require("fs");
const path = require("path");

const IMAGES_DIR = path.join(__dirname, "skins", "images");
const OUTPUT_FILE = path.join(__dirname, "data.json");

function walk(dir, baseDir) {
  const results = [];
  const entries = fs.readdirSync(dir, { withFileTypes: true });

  for (const entry of entries) {
    const fullPath = path.join(dir, entry.name);

    if (entry.isDirectory()) {
      results.push(...walk(fullPath, baseDir));
    } else if (entry.isFile() && /\.png$/i.test(entry.name)) {
      const relative = path.relative(baseDir, fullPath).split(path.sep).join("/");
      results.push({ file: relative });
    }
  }

  return results;
}

function main() {
  if (!fs.existsSync(IMAGES_DIR)) {
    console.error("Папка не найдена:", IMAGES_DIR);
    process.exit(1);
  }

  const data = walk(IMAGES_DIR, IMAGES_DIR);
  fs.writeFileSync(OUTPUT_FILE, JSON.stringify(data, null, 2), "utf-8");

  console.log(`Готово! Найдено файлов: ${data.length}`);
  console.log(`data.json создан по пути: ${OUTPUT_FILE}`);
}

main();
